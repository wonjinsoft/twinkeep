services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://twinkeep:twinkeep@postgres:5432/twinkeep
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      - redis
      - postgres
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=twinkeep
      - POSTGRES_PASSWORD=twinkeep
      - POSTGRES_DB=twinkeep
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
